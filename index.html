
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoGames - Tu Setup Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TecnoGames</a>
            <div class="d-flex">
                <button class="btn btn-primary position-relative" id="btn-carrito">
                    🛒 Mi Carrito
                    <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center mb-4 border-bottom pb-2">Catálogo de Periféricos</h1>
        
        <div class="row row-cols-1 row-cols-md-3 g-4" id="contenedor-productos">
            
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="/assets/img/mouse.jpg" class="card-img-top p-3" alt="Mouse Gamer">
                    <div class="card-body">
                        <h5 class="card-title">Mouse Óptico RGB</h5>
                        <p class="card-text fw-bold text-primary fs-4">$15.990</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-secondary btn-sm">Ver detalle</button>
                            <button class="btn btn-primary btn-agregar" data-id="1">Agregar al carro</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="/assets/img/teclado.jpg" class="card-img-top p-3" alt="Teclado Mecánico">
                    <div class="card-body">
                        <h5 class="card-title">Teclado Mecánico 60%</h5>
                        <p class="card-text fw-bold text-primary fs-4">$45.500</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-secondary btn-sm">Ver detalle</button>
                            <button class="btn btn-primary btn-agregar" data-id="2">Agregar al carro</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="/assets/img/audifono.jpg" class="card-img-top p-3" alt="Audífonos Gamer">
                    <div class="card-body">
                        <h5 class="card-title">Audífonos Surround 7.1</h5>
                        <p class="card-text fw-bold text-primary fs-4">$32.000</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-secondary btn-sm">Ver detalle</button>
                            <button class="btn btn-primary btn-agregar" data-id="3">Agregar al carro</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer class="bg-dark text-light text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">© 2026 TecnoGames CL - Tu victoria empieza aquí.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
